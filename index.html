<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Treasure Gold Block Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Treasure Gold Block Trainer</h1>

  <div id="setup">

    <div class="setup-box">

      <h2>Treasure Type</h2>

      <label><input type="radio" name="type" id="all"> All Treasures</label>
      <label><input type="radio" name="type" id="ranked" checked> Ranked Treasures</label>

    </div>

    <div class="setup-box">

      <h2>Scoring Mode</h2>

      <label><input type="radio" name="scoreMode" id="scoreBoth" checked> Both Ramparts</label>
      <label><input type="radio" name="scoreMode" id="scoreLeft"> Left Rampart Only</label>
      <label><input type="radio" name="scoreMode" id="scoreRight"> Right Rampart Only</label>

    </div>

    <div class="setup-box">

      <div class="setup-heading">
        <h2>Left Rampart GB Positions</h2>
        <label class="without-toggle"><input type="checkbox" id="LWITHOUT"> Without</label>
      </div>

      <label><input type="radio" name="leftRampartMode" id="LANY" checked> All (L1-L6)</label>

      <label><input type="radio" name="leftRampartMode" id="LL"> Left (L1,L2)</label>
      <label><input type="radio" name="leftRampartMode" id="LM"> Middle (L3,L4,L5)</label>
      <label><input type="radio" name="leftRampartMode" id="LR"> Right (L6)</label>

    </div>

    <div class="setup-box">

      <div class="setup-heading">
        <h2>Right Rampart GB Positions</h2>
        <label class="without-toggle"><input type="checkbox" id="RWITHOUT"> Without</label>
      </div>

      <label><input type="radio" name="rightRampartMode" id="RANY" checked> All (R1-R6)</label>

      <label><input type="radio" name="rightRampartMode" id="RL"> Left (R1,R2)</label>
      <label><input type="radio" name="rightRampartMode" id="RM"> Middle (R3,R4,R5)</label>
      <label><input type="radio" name="rightRampartMode" id="RR"> Right (R6)</label>

    </div>

    <div class="setup-box">

      <h2>Facing</h2>

      <label><input type="checkbox" id="north" checked> North</label>
      <label><input type="checkbox" id="south" checked> South</label>
      <label><input type="checkbox" id="east" checked> East</label>
      <label><input type="checkbox" id="west" checked> West</label>

    </div>

    <div id="startOptions">
      <button class="start-btn" data-session-mode="count" data-session-size="10">10 Bastions Mode</button>
      <button class="start-btn" data-session-mode="timed" data-session-seconds="60">60 Second Mode</button>
      <button class="start-btn" data-session-mode="flashcard">Flashcard Mode</button>
      <button class="start-btn" data-session-mode="chunkmap">Chunkmap Mode</button>
      <button class="start-btn" data-session-mode="infinite">Infinite Mode</button>
    </div>

    <div id="filterWarning"></div>

  </div>

  <div id="card">

    <div id="case"></div>
    <div id="chunkmapWrap">
      <div id="chunkmapFrame">
        <div id="chunkmapXAxisWrap">
          <div class="axis-title axis-title-x">X</div>
          <div id="chunkmapXAxis"></div>
        </div>
        <div id="chunkmapBody">
          <div id="chunkmapZAxisWrap">
            <div class="axis-title axis-title-z">Z</div>
            <div id="chunkmapZAxis"></div>
          </div>
          <div id="chunkmap"></div>
        </div>
      </div>
      <div id="chunkmapMeta"></div>
    </div>

    <div class="ramparts">

      <div class="rampart">

        <h3>LEFT Rampart</h3>

        <div class="rampart-grid">

          <div class="block" data-block="L1">L1<div class="key">1</div>
          </div>
          <div class="empty"></div>
          <div class="block" data-block="L3">L3<div class="key">3</div>
          </div>
          <div class="block" data-block="L4">L4<div class="key">4</div>
          </div>

          <div class="empty"></div>
          <div class="empty"></div>

          <div class="empty"></div>
          <div class="empty"></div>
          <div class="block" data-block="L5">L5<div class="key">5</div>
          </div>

          <div class="empty"></div>
          <div class="empty"></div>
          <div class="block" data-block="L6">L6<div class="key">6</div>
          </div>

          <div class="block" data-block="L2">L2<div class="key">2</div>
          </div>

        </div>

      </div>

      <div class="rampart">

        <h3>RIGHT Rampart</h3>

        <div class="rampart-grid">

          <div class="block" data-block="R1">R1<div class="key">Q</div>
          </div>
          <div class="empty"></div>
          <div class="block" data-block="R3">R3<div class="key">E</div>
          </div>
          <div class="block" data-block="R4">R4<div class="key">R</div>
          </div>

          <div class="empty"></div>
          <div class="empty"></div>

          <div class="empty"></div>
          <div class="empty"></div>
          <div class="block" data-block="R5">R5<div class="key">T</div>
          </div>

          <div class="empty"></div>
          <div class="empty"></div>
          <div class="block" data-block="R6">R6<div class="key">Y</div>
          </div>

          <div class="block" data-block="R2">R2<div class="key">W</div>
          </div>

        </div>

      </div>

    </div>

    <div>

      <button id="checkBtn">Check</button>
      <button id="revealBtn">Reveal</button>
      <button id="nextBtn">Next</button>
      <button id="endBtn">Exit</button>

    </div>

    <div id="answer"></div>
    <div id="stats"></div>
    <div id="debug"></div>

  </div>

  <script src="trainer.js"></script>

</body>

</html>
